name: Docker CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3️⃣ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 4️⃣ Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest .

    # 5️⃣ Scan Docker image using Trivy
    - name: Scan Docker Image
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    # 6️⃣ Push Docker image (only on main branch)
    - name: Push Docker Image
      if: github.ref == 'refs/heads/main'
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest