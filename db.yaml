apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  namespace: hospital-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: backend-cont
          image: mongo
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "production"
            - name: SESSION_SECRET
              value: "hospital-secret-key-2024-change-this-in-production"
            - name: JWT_SECRET
              value: "jwt-secret-key-hospital-2024-change-this-in-production"
            - name: ADMIN_USERNAME
              value: "admin"
            - name: ADMIN_PASSWORD
              value: "admin123"  
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: hospital-ns
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
              

