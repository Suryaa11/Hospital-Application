apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  namespace: hospital-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: backend-cont
          image: mongo
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: hospital-ns
spec:
  selector:
    labels:
      app: mongo
  ports:
    - port: 27017
      containerPort: 27017
  type: ClusterPort
              

